<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#d50000"/>
<link rel="manifest" href="manifest.json?v=4.3"/>
<link rel="icon" href="icon-192.png"/>
<title>Lopes Serviços Mecânicos</title>
<link rel="stylesheet" href="styles.css?v=4.3"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="app.js?v=4.3"></script>
</head>

<body>

<div class="test-banner">⚠ AMBIENTE DE TESTE</div>

<header class="topbar">
<div class="brand">
<img class="brand-logo" src="logo.png" alt="Lopes Serviços Mecânicos"/>
<div class="brand-text">
<div class="brand-title">Lopes Serviços Mecânicos</div>
<div class="brand-sub">Leme/SP • (19) 99772-6572</div>
</div>
</div>

<div class="top-actions">
<button class="btn ghost" id="btnInstall" title="Instalar aplicativo">📲</button>
<button class="btn ghost" id="btnSync" title="Sincronizar">☁️</button>
<button class="btn ghost" id="btnConfig" title="Configurações">⚙️</button>
</div>
</header>

<main class="layout">
<section class="card search">
<div class="row">
<input id="q" class="input" placeholder="Buscar por placa, cliente ou telefone…"/>
<button id="btnNewOS" class="btn primary">Nova OS</button>
</div>
<div class="chips" id="quickChips"></div>
</section>

<section class="grid">
<section class="card">
<div class="card-h">
<h2>Clientes</h2>
<button class="btn" id="btnNewClient">+ Cliente</button>
</div>
<div id="clientsList" class="list"></div>
</section>

<section class="card">
<div class="card-h">
<h2>Veículos</h2>
<button class="btn" id="btnNewVehicle">+ Veículo</button>
</div>
<div id="vehiclesList" class="list"></div>
</section>

<section class="card">
<div class="card-h">
<h2>Serviços / OS</h2>
<div class="spacer"></div>
<button class="btn" id="btnOilAlerts">🔔 Avisos</button>
<button class="btn" id="btnReport">📊 Relatório</button>
<button class="btn" id="btnCash">💰 Caixa</button>
</div>
<div id="servicesList" class="list"></div>
</section>
</section>
</main>

<div id="printArea" class="print-area" hidden></div>

</body>
</html>
